services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tr-seo-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tr_seo}
      POSTGRES_USER: ${POSTGRES_USER:-tr_seo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tr_seo}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tr-seo-redis
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: tr-seo-api
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://tr_seo:tr_seo@postgres:5432/tr_seo}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SEMRUSH_API_KEY: ${SEMRUSH_API_KEY:-}
      MODULE0_UPLOAD_DIR: ${MODULE0_UPLOAD_DIR:-uploads/module0}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  portal:
    build:
      context: .
      dockerfile: apps/portal/Dockerfile
    container_name: tr-seo-portal
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
