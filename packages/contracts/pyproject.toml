[project]
name = "tr-seo-contracts"
version = "0.1.0"
description = "Shared typed contracts for Traffic Radius SEO Automation System."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.8,<3.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tr_seo_contracts"]
