[project]
name = "tr-seo-db"
version = "0.1.0"
description = "Database models for Traffic Radius SEO Automation System."
requires-python = ">=3.12"
dependencies = [
    "sqlalchemy>=2.0,<3.0",
    "tr-seo-contracts",
]

[tool.uv.sources]
tr-seo-contracts = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tr_seo_db"]
